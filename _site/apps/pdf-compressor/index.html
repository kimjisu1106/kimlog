<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 용량 줄이기</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <script src="./js/prevent.js"></script>
  <script src="./js/libs.js"></script>
  <script src="./js/app.js"></script>
  <body>
    <div id="newTool">
      <!-- VIEW 1: Form -->
      <section id="viewForm">
        <h1>PDF 용량 줄이기</h1>

        <div class="box">
          <label>PDF 업로드</label>

          <div id="dropZone" class="drop box" aria-label="PDF dropzone">
            <div id="dropText">
              여기에 PDF 파일을 끌어다 놓거나, 클릭해서 선택하세요<br />
              <span class="small"
                >(PDF, 최대 <span id="maxFilesText"></span>개)</span
              >
            </div>

            <div id="panel" class="hidden">
              <div class="topRow">
                <div class="small">
                  PDF: <b><span id="pdfCount">0</span></b> /
                  <span id="maxFilesText2"></span>
                  <span id="pdfWarn" class="warn hidden"
                    >제한 초과. 삭제하세요.</span
                  >
                </div>
                <div class="btnRow">
                  <button id="btnAddPdfs" type="button" class="btnMini">
                    PDF 추가
                  </button>
                  <button id="btnReset" type="button" class="btnMini">
                    전체 초기화
                  </button>
                </div>
              </div>
              <div id="pdfList" class="pdfList"></div>
            </div>

            <input
              type="file"
              id="file"
              accept="application/pdf"
              multiple
              class="fileInput"
            />
          </div>

          <div class="hint">
            이미지 기반 압축으로 처리됩니다. (브라우저에서만 동작)
          </div>

          <div class="qualityRow">
            <span class="qualityLabel">압축 수준</span>
            <div class="qualityBtns">
              <button type="button" class="btnQuality active" data-q="high">
                높은 품질
              </button>
              <button type="button" class="btnQuality" data-q="mid">
                보통
              </button>
              <button type="button" class="btnQuality" data-q="low">
                최대 압축
              </button>
            </div>
          </div>

          <div class="actionsBar">
            <button id="btnCompress" type="button" class="btnPrimary" disabled>
              압축 시작
            </button>
          </div>

          <div id="libStatus" class="hint"></div>
        </div>

        <div class="hint">
          <a href="/privacy-policy/" target="_blank" rel="noopener"
            >개인정보처리방침</a
          >
          | 이 도구는 브라우저에서만 작동합니다.
        </div>
      </section>

      <!-- VIEW 2: Loading -->
      <section id="viewLoading" class="hidden">
        <h1>압축 중…</h1>
        <div class="box box-center">
          <div class="loadingTitle" id="loadingTitle">PDF 압축 중</div>
          <div class="hint">
            변환된 파일은 바로 다운로드하지 않으면 사라집니다.
          </div>

          <div class="progressWrap">
            <div class="spinner" aria-hidden="true"></div>
            <div class="bar-wrap"><div id="bar" class="bar"></div></div>
            <div id="loadingText" class="hint">0%</div>
          </div>

          <div id="loadingStep" class="hint step-hint"></div>
        </div>
      </section>

      <!-- VIEW 3: Done -->
      <section id="viewDone" class="hidden">
        <h1>완료</h1>
        <div class="box">
          <div class="doneTitle" id="doneTitle">압축 완료</div>
          <div id="doneInfo" class="hint"></div>
          <button id="btnDownload" type="button" class="btn-top">
            다운로드
          </button>
          <button id="btnBack" type="button" class="btn-sub">
            다른 파일로 압축하기
          </button>
        </div>
      </section>

      <!-- Preview Modal -->
      <div id="previewModal" class="modal hidden">
        <div class="modalDim"></div>
        <div class="modalBox">
          <div class="modalTop">
            <div class="modalTitleText" id="previewTitle">미리보기</div>
            <button id="btnClosePreview" class="btnMini">닫기</button>
          </div>
          <div class="modalMeta" id="previewMeta"></div>
          <div class="modalBody">
            <canvas id="previewCanvas"></canvas>
            <div id="previewHint" class="hint preview-hint"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
