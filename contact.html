<div class="support-buttons">

    target="_blank"
    class="support-btn"
  >
    🩵 PayPal
  </a>
  <button class="support-btn" id="kakao-btn">💛 카카오페이</button>

<div class="kakao-qr-modal" id="kakao-qr-modal" hidden>
  <div class="kakao-qr-box">
    <p>카카오페이 앱으로 스캔해주세요</p>
    <img
      src="{{ '/assets/images/kakaopay-qr.png' | relative_url }}"
      alt="KakaoPay QR"
      width="180"
    />
    <button class="kakao-qr-close" id="kakao-qr-close">닫기</button>
  </div>
</div>

<script>
  (function () {
    var btn = document.getElementById("kakao-btn");
    var modal = document.getElementById("kakao-qr-modal");
    var closeBtn = document.getElementById("kakao-qr-close");
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    btn.addEventListener("click", function () {
      if (isMobile) {
        window.location.href = "https://qr.kakaopay.com/Ej9NoO4uc";
      } else {
        modal.hidden = false;
      }
    });

    closeBtn.addEventListener("click", function () {
      modal.hidden = true;
    });

    modal.addEventListener("click", function (e) {
      if (e.target === modal) modal.hidden = true;
    });
  })();
</script>
