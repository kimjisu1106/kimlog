---
layout: page
title: 검색
permalink: /search/
---

<div class="wordcloud-wrap">
  <p class="post-meta wordcloud-label">최근 1년 태그</p>
  <canvas id="tag-cloud"></canvas>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" id="search-input" placeholder="검색어를 입력하세요...">
  <ul class="devlog-list" id="search-results"></ul>
  <p class="search-empty post-meta" id="search-empty" hidden>검색 결과가 없습니다.</p>
</div>

<script>
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const empty = document.getElementById('search-empty');
  let posts = [];
  let ready = false;

  function runSearch() {
    const q = input.value.trim().toLowerCase();
    results.innerHTML = '';
    empty.hidden = true;

    if (q.length < 1) return;

    if (!ready) {
      results.innerHTML = '<li class="post-meta">검색 인덱스 로딩 중...</li>';
      return;
    }

    const matched = posts
      .filter(p =>
        (p.title || '').toLowerCase().includes(q) ||
        (p.content || '').toLowerCase().includes(q)
      )
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (matched.length === 0) {
      empty.hidden = false;
      return;
    }

    matched.forEach(p => {
      const li = document.createElement('li');
      const idx = (p.content || '').toLowerCase().indexOf(q);
      const snippet = idx >= 0
        ? '…' + p.content.slice(Math.max(0, idx - 40), idx + 80) + '…'
        : '';
      li.innerHTML = `
        <span class="post-meta">${p.date}</span> ｜
        <a href="${p.url}">${p.title}</a>
        ${snippet ? `<p class="search-snippet post-meta">${snippet}</p>` : ''}
      `;
      results.appendChild(li);
    });
  }

  function renderWordCloud(posts) {
    if (typeof WordCloud === 'undefined') return;

    const now = new Date();
    const yearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());

    const freq = {};
    posts.forEach(p => {
      if (!p.tags || !p.date) return;
      if (new Date(p.date) < yearAgo) return;
      p.tags.forEach(tag => { freq[tag] = (freq[tag] || 0) + 1; });
    });

    const list = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 60);
    if (list.length === 0) return;

    const maxFreq = list[0][1];
    const canvas = document.getElementById('tag-cloud');
    const w = canvas.parentElement.offsetWidth;
    canvas.width = w;
    canvas.height = Math.round(Math.min(200, Math.max(120, w * 0.3)));

    const colors = ['#2a7ae4', '#5b9ef5', '#40a9a0', '#e86b5f', '#f5a623', '#7c5cfc'];

    WordCloud(canvas, {
      list: list,
      gridSize: Math.round(w / 60),
      weightFactor: function(n) { return Math.max(13, (n / maxFreq) * 52); },
      fontFamily: 'sans-serif',
      color: function() { return colors[Math.floor(Math.random() * colors.length)]; },
      backgroundColor: 'transparent',
      rotateRatio: 0,
      shrinkToFit: true,
      click: function(item) {
        input.value = item[0];
        input.dispatchEvent(new Event('input'));
        input.focus();
      },
      cursor: 'pointer',
    });
  }

  function loadWordCloud(cb) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js';
    s.onload = cb;
    s.onerror = function() {
      var s2 = document.createElement('script');
      s2.src = 'https://unpkg.com/wordcloud@1.2.2/src/wordcloud2.js';
      s2.onload = cb;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }

  fetch('/search.json')
    .then(r => r.json())
    .then(data => {
      posts = data;
      ready = true;
      runSearch();
      loadWordCloud(function() { renderWordCloud(posts); });
    });

  input.addEventListener('input', runSearch);
</script>
